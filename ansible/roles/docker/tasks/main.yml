---
- name: Install Docker engine and repository
  become: true
  tags:
    - docker_install
  block:
    # installation block: repo setup and package installation
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      notify: restart docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true
      notify: restart docker

  rescue:
    # recovery path for transient key/repo network failures
    - name: Wait before retrying Docker repository setup
      ansible.builtin.wait_for:
        timeout: 10

    - name: Refresh apt cache before retry
      ansible.builtin.apt:
        update_cache: true

    - name: Retry adding Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Retry adding Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      notify: restart docker

    - name: Retry installing Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true
      notify: restart docker

  always:
    # service is always converged even if installation path retried
    - name: Ensure docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Configure Docker runtime access
  become: true
  tags:
    - docker_config
  block:
    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
