---
- name: Wipe web application deployment
  become: true
  when: web_app_wipe | bool
  tags:
    - web_app_wipe
  block:
    # stop and remove compose-managed containers
    - name: Stop and remove compose stack
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
        remove_images: "{{ 'local' if (web_app_wipe_remove_images | bool) else omit }}"
      ignore_errors: true

    - name: Remove docker-compose file
      ansible.builtin.file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Log wipe completion
      ansible.builtin.debug:
        msg: "Application {{ app_name }} wiped successfully"
