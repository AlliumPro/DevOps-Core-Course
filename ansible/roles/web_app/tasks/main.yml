---
- name: Include wipe logic
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy web application with Docker Compose
  become: true
  tags:
    - app_deploy
    - compose
  block:
    # docker auth is required before pull for private/public rate-limited registries
    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: https://index.docker.io/v1/
      no_log: true

    - name: Create application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render docker-compose configuration
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"
      notify: restart web app stack

    - name: Deploy stack with Docker Compose v2
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always

    - name: Wait for application port
      ansible.builtin.wait_for:
        port: "{{ app_port }}"
        delay: 2
        timeout: "{{ app_wait_timeout }}"

    - name: Verify health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}{{ app_health_path }}"
        status_code: 200

  rescue:
    - name: Show deployment failure hint
      ansible.builtin.debug:
        msg: "Docker Compose deployment failed for {{ app_name }}. Check compose logs on target host."

