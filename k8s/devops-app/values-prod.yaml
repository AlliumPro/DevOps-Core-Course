replicaCount: 3

image:
  tag: lab12

app:
  environment: production

configMap:
  env:
    data:
      APP_PROFILE: production
      FEATURE_VISITS_ENABLED: "true"
      FEATURE_METRICS_ENABLED: "true"

persistence:
  enabled: true
  size: 500Mi
  storageClass: ""

service:
  type: NodePort
  nodePort: 30082

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 3
  timeoutSeconds: 2
  failureThreshold: 3
