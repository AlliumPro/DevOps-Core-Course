{{- if and (not .Values.rollout.enabled) (not .Values.statefulset.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-app.fullname" . }}
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "devops-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "devops-app.selectorLabels" . | nindent 8 }}
      {{- $hasPodAnnotations := gt (len .Values.podAnnotations) 0 }}
      {{- $hasConfigAnnotations := or .Values.configMap.file.enabled .Values.configMap.env.enabled }}
      {{- if or $hasPodAnnotations .Values.vault.enabled $hasConfigAnnotations }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.configMap.file.enabled }}
        checksum/config-file: {{ .Files.Get "files/config.json" | sha256sum }}
        {{- end }}
        {{- if .Values.configMap.env.enabled }}
        checksum/config-env: {{ toYaml .Values.configMap.env.data | sha256sum }}
        {{- end }}
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-{{ .Values.vault.injectFile }}: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-command-{{ .Values.vault.injectFile }}: {{ .Values.vault.agentInjectCommand | quote }}
        vault.hashicorp.com/agent-inject-template-{{ .Values.vault.injectFile }}: |
          {{`{{- with secret "`}}{{ .Values.vault.secretPath }}{{`" -}}`}}
          DATABASE_USERNAME={{`{{ .Data.data.username }}`}}
          DATABASE_PASSWORD={{`{{ .Data.data.password }}`}}
          API_KEY={{`{{ .Data.data.api_key }}`}}
          {{`{{- end }}`}}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "devops-app.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            {{- include "devops-app.envVars" . | nindent 12 }}
          envFrom:
            {{- if .Values.configMap.env.enabled }}
            - configMapRef:
                name: {{ include "devops-app.configEnvConfigMapName" . }}
            {{- end }}
            {{- if or .Values.secret.create .Values.secret.name }}
            - secretRef:
                name: {{ include "devops-app.secretName" . }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            {{- if .Values.configMap.file.enabled }}
            - name: config-file-volume
              mountPath: {{ .Values.configMap.file.mountPath }}
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data-volume
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      {{- if or .Values.configMap.file.enabled .Values.persistence.enabled }}
      volumes:
        {{- if .Values.configMap.file.enabled }}
        - name: config-file-volume
          configMap:
            name: {{ include "devops-app.configFileConfigMapName" . }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: {{ include "devops-app.pvcName" . }}
        {{- end }}
      {{- end }}
{{- end }}
