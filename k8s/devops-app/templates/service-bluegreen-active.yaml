{{- if and .Values.rollout.enabled (eq .Values.rollout.strategy "blueGreen") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-app.fullname" . }}-{{ .Values.rollout.blueGreen.activeServiceSuffix }}
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "devops-app.selectorLabels" . | nindent 4 }}
{{- end }}
