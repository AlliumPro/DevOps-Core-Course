{{- if .Values.hooks.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-app.fullname" . }}-pre-install"
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "devops-app.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: pre-install-validation
          image: {{ .Values.hooks.image }}
          command:
            - sh
            - -c
            - |
              echo "[pre-install] validating chart configuration"
              echo "[pre-install] release={{ .Release.Name }} namespace={{ .Release.Namespace }}"
              sleep 3
              echo "[pre-install] completed"
{{- end }}
