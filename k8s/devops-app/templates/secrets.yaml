{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "devops-app.secretName" . }}
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.secret.data.username | quote }}
  password: {{ .Values.secret.data.password | quote }}
{{- end }}
