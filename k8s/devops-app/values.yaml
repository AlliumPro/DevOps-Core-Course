replicaCount: 2

nameOverride: ""
fullnameOverride: ""

image:
  repository: alliumpro/devops-app
  tag: lab09
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: devops-app-sa
  automount: true

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

containerPort: 5000

app:
  port: "5000"
  environment: kubernetes
  logLevel: INFO

configMap:
  file:
    enabled: true
    fileName: config.json
    mountPath: /config
  env:
    enabled: true
    data:
      APP_PROFILE: development
      FEATURE_VISITS_ENABLED: "true"
      FEATURE_METRICS_ENABLED: "true"

persistence:
  enabled: true
  existingClaim: ""
  mountPath: /data
  fileName: visits
  accessMode: ReadWriteOnce
  size: 100Mi
  storageClass: ""

secret:
  create: true
  name: ""
  data:
    username: change-me
    password: change-me

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

podAnnotations: {}

hooks:
  enabled: true
  image: busybox:1.36

vault:
  enabled: false
  role: devops-app-role
  secretPath: secret/data/devops-app/config
  injectFile: app-config.env
  agentInjectCommand: chmod 0400 /vault/secrets/app-config.env

rollout:
  enabled: true
  strategy: canary
  canary:
    stableServiceSuffix: stable
    canaryServiceSuffix: canary
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100
    analysis:
      enabled: false
      templateName: success-rate
  blueGreen:
    activeServiceSuffix: active
    previewServiceSuffix: preview
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30

statefulset:
  enabled: false
  serviceNameSuffix: headless
  updateStrategy:
    type: RollingUpdate
    partition: 0
