replicaCount: 1

image:
  tag: lab12

app:
  environment: development

configMap:
  env:
    data:
      APP_PROFILE: development
      FEATURE_VISITS_ENABLED: "true"
      FEATURE_METRICS_ENABLED: "true"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""

service:
  type: NodePort
  nodePort: 30081

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
