replicaCount: 3

image:
  repository: devops-app
  tag: lab14-v2
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

app:
  environment: statefulset

persistence:
  enabled: true
  size: 50Mi
  storageClass: ""

rollout:
  enabled: false

statefulset:
  enabled: true
  serviceNameSuffix: headless
  updateStrategy:
    type: RollingUpdate
    partition: 0
